name: Release Desktop App

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      ai_import_service_url:
        description: 'AI import service URL used by the packaged desktop app'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        shell: bash
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure desktop AI import environment
        shell: bash
        env:
          AI_IMPORT_SERVICE_URL_INPUT: ${{ inputs.ai_import_service_url }}
          AI_IMPORT_SERVICE_URL_SECRET: ${{ secrets.AI_IMPORT_SERVICE_URL }}
          AI_IMPORT_SERVICE_SECRET: ${{ secrets.AI_IMPORT_SERVICE_SECRET }}
        run: |
          set -euo pipefail
          AI_IMPORT_SERVICE_URL="${AI_IMPORT_SERVICE_URL_INPUT:-$AI_IMPORT_SERVICE_URL_SECRET}"
          {
            if [ -n "$AI_IMPORT_SERVICE_URL" ]; then
              printf 'AI_IMPORT_SERVICE_URL=%s\n' "$AI_IMPORT_SERVICE_URL"
            fi
            if [ -n "$AI_IMPORT_SERVICE_SECRET" ]; then
              printf 'AI_IMPORT_SERVICE_SECRET=%s\n' "$AI_IMPORT_SERVICE_SECRET"
            fi
          } > apps/desktop/.env.local

      # macOS: generate .icns from source PNG (iconutil is macOS-only)
      - name: Generate macOS icon
        if: matrix.platform == 'mac'
        run: |
          cd apps/desktop
          mkdir -p build
          ICONSET_DIR=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET_DIR"
          SOURCE=public/icon-512.png
          sips -z 16 16 "$SOURCE" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32 "$SOURCE" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32 "$SOURCE" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64 "$SOURCE" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128 "$SOURCE" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256 "$SOURCE" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256 "$SOURCE" --out "$ICONSET_DIR/icon_256x256.png"
          sips -z 512 512 "$SOURCE" --out "$ICONSET_DIR/icon_256x256@2x.png"
          sips -z 512 512 "$SOURCE" --out "$ICONSET_DIR/icon_512x512.png"
          cp "$SOURCE" "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o build/icon.icns

      # Windows: generate .ico from source PNG using ImageMagick (pre-installed on GitHub runners)
      - name: Generate Windows icon
        if: matrix.platform == 'win'
        shell: bash
        run: |
          cd apps/desktop
          mkdir -p build
          magick public/icon-512.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico

      # Linux: generate multi-size PNGs for .desktop icon
      - name: Generate Linux icons
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          cd apps/desktop
          mkdir -p build/icons
          SOURCE=public/icon-512.png
          for size in 16 32 48 64 128 256 512; do
            convert "$SOURCE" -resize ${size}x${size} "build/icons/${size}x${size}.png"
          done

      - name: Build and package (${{ matrix.platform }})
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_IMPORT_SERVICE_URL: ${{ inputs.ai_import_service_url || secrets.AI_IMPORT_SERVICE_URL }}
          AI_IMPORT_SERVICE_SECRET: ${{ secrets.AI_IMPORT_SERVICE_SECRET }}
          # Disable auto code signing discovery — only sign when secrets are explicitly configured
          CSC_IDENTITY_AUTO_DISCOVERY: false
        working-directory: apps/desktop
        run: |
          # Conditionally enable macOS code signing
          if [ -n "${{ secrets.MAC_CERTS }}" ]; then
            export CSC_LINK="${{ secrets.MAC_CERTS }}"
            export CSC_KEY_PASSWORD="${{ secrets.MAC_CERTS_PASSWORD }}"
          fi
          # Conditionally enable Windows code signing
          if [ -n "${{ secrets.WIN_CERTS }}" ]; then
            export WIN_CSC_LINK="${{ secrets.WIN_CERTS }}"
            export WIN_CSC_KEY_PASSWORD="${{ secrets.WIN_CERTS_PASSWORD }}"
          fi
          yarn dist:${{ matrix.platform }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ matrix.platform }}
          path: apps/desktop/release/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mapfile -d '' files < <(
            find release-artifacts -type f \
              ! -path '*/mac/*' \
              ! -path '*/mac-arm64/*' \
              ! -path '*/win-unpacked/*' \
              ! -path '*/win-arm64-unpacked/*' \
              ! -path '*/linux-unpacked/*' \
              ! -path '*/linux-arm64-unpacked/*' \
              \( \
              -name '*.AppImage' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.zip' -o \
              -name '*.blockmap' -o \
              -name 'latest*.yml' \
            \) -print0
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          release_version="${TAG_NAME#desktop-v}"
          release_title="Password Volt Desktop ${release_version}"
          release_notes="Desktop release ${release_version}."

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "$release_title" \
              --notes "$release_notes" \
              --verify-tag
          fi
