name: Release Mobile App

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Mobile release version, for example 1.1.0 or mobile-v1.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Android
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      # - name: Build iOS
      #   working-directory: apps/mobile
      #   run: eas build --platform ios --profile production --non-interactive

      - name: Get build artifact URL
        id: build-url
        working-directory: apps/mobile
        run: |
          URL=$(eas build:list --platform android --status finished \
            --json --limit 1 --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: curl -L -o android-release.apk "${{ steps.build-url.outputs.url }}"

      - name: Resolve release tag
        id: release-meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/mobile-v* ]]; then
            tag_name="$GITHUB_REF_NAME"
          else
            release_version="${INPUT_VERSION#mobile-v}"
            if [ -z "$release_version" ]; then
              echo "workflow_dispatch requires a version input."
              exit 1
            fi
            tag_name="mobile-v${release_version}"
          fi

          if [[ ! "$tag_name" =~ ^mobile-v[0-9]+(\.[0-9]+){1,2}([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid mobile release tag: $tag_name"
            echo "Use a value like 1.1.0 or mobile-v1.1.0."
            exit 1
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG_NAME: ${{ steps.release-meta.outputs.tag_name }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release tag ${TAG_NAME} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME" "$GITHUB_SHA"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_name }}
          files: android-release.apk
          generate_release_notes: true
