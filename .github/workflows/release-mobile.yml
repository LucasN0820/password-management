name: Release Mobile App

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Android
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      # - name: Build iOS
      #   working-directory: apps/mobile
      #   run: eas build --platform ios --profile production --non-interactive

      - name: Get build artifact URL
        id: build-url
        working-directory: apps/mobile
        run: |
          URL=$(eas build:list --platform android --status finished \
            --json --limit 1 --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: curl -L -o android-release.apk "${{ steps.build-url.outputs.url }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android-release.apk
          generate_release_notes: true
